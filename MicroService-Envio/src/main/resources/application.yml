spring:
  application:
    name: MicroService-Envio

  datasource:
    url: jdbc:mysql://localhost:3306/db_envio
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

server:
  port: 8088

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /envio/swagger-ui.html

usuario:
  service:
    url: http://localhost:8081/v1/usuarios

pedido:
  service:
    url: http://localhost:8086/v1/pedidos