spring:
  application:
    name: MicroService-Envio

  datasource:
    url: jdbc:mysql://localhost:3306/db_envio
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

server:
  port: 8088

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /envio/swagger-ui.html

usuario:
  service:
    url: ${GATEWAY_URL:http://localhost:8080}/v1/usuarios

pedido:
  service:
    url: ${GATEWAY_URL:http://localhost:8080}/v1/pedidos