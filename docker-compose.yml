services:

  #MySQL
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  # Eureka
  eureka-server:
    build: ./Eureka-Server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # API Gateway
  api-gateway:
    build: ./Api-Gateway
    container_name: api-gateway
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    networks:
      - backend

 #Usuario
  microservice-usuario:
    build: ./MicroService-Usuario
    container_name: microservice-usuario
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_usuario
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Categoria
  microservice-categoria:
    build: ./MicroService-Categoria
    container_name: microservice-categoria
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_categoria
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Producto
  microservice-producto:
    build: ./MicroService-Producto
    container_name: microservice-producto
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_producto
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      CATEGORIAS_URL: http://microservice-categoria:8082
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Inventario
  microservice-inventario:
    build: ./MicroService-Inventario
    container_name: microservice-inventario
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_inventario
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      MICROSERVICIOS_PRODUCTOS_URL: http://microservice-producto:8083/v1/productos
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Carrito
  microservice-carrito:
    build: ./MicroService-Carrito
    container_name: microservice-carrito
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_carrito
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      MICROSERVICIOS_PRODUCTOS_URL: http://microservice-usuario:8081
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Pedido
  microservice-pedido:
    build: ./MicroService-Pedido
    container_name: microservice-pedido
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_pedido
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      USUARIO_SERVICE_URL: http://microservice-usuario:8081/v1/usuarios
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Pagos
  microservice-pagos:
    build: ./MicroService-Pagos
    container_name: microservice-pagos
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_pagos
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      PEDIDO_SERVICE_URL: http://microservice-pedido:8086/v1/pedidos
    ports:
      - "8087:8087"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Envio
  microservice-envio:
    build: ./MicroService-Envio
    container_name: microservice-envio
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_envio
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      USUARIO_SERVICE_URL: http://microservice-usuario:8081/v1/usuarios
      PEDIDO_SERVICE_URL: http://microservice-pedido:8086/v1/pedidos
    ports:
      - "8088:8088"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Notificacion
  microservice-notificacion:
    build: ./MicroService-Notificacion
    container_name: microservice-notificacion
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_notificacion
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      USUARIOS_SERVICE_URL: http://microservice-usuario:8081
    ports:
      - "8089:8089"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

  #Reporte
  microservice-reporte:
    build: ./MicroService-Reporte
    container_name: microservice-reporte
    restart: unless-stopped
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/db_reporte
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8090:8090"
    depends_on:
      eureka-server:
        condition: service_started
      mysql-db:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mysql-data: