spring:
  application:
    name: MicroService-Categoria

  datasource:
    url: jdbc:mysql://localhost:3306/db_categoria
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

server:
  port: 8082

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /categoria/swagger-ui.html